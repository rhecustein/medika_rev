<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kriteria — SPK Medika</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/assets/css/style.css">
<style>
  :root { --primary:#C62828; }

  /* Summary cards */
  .sum-card {
    background:#fff;border-radius:12px;border:1px solid #F0F0F0;
    padding:16px 18px;display:flex;align-items:center;gap:12px;
    box-shadow:0 1px 4px rgba(0,0,0,.05);
  }
  .sum-icon {
    width:42px;height:42px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:1.2rem;
  }
  .sum-label { font-size:.7rem;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.4px; }
  .sum-value { font-size:1.45rem;font-weight:700;line-height:1.1;color:#1a1a1a; }

  /* Table */
  .tbl-kriteria thead th {
    background:#FAFAFA;font-size:.75rem;font-weight:700;color:#666;
    text-transform:uppercase;letter-spacing:.4px;
    padding:10px 14px;border-bottom:2px solid #F0F0F0;white-space:nowrap;
  }
  .tbl-kriteria tbody td { padding:11px 14px;vertical-align:middle; }
  .tbl-kriteria tbody tr { border-bottom:1px solid #F8F8F8;transition:background .12s; }
  .tbl-kriteria tbody tr:hover { background:#FAFAFA; }

  /* Kode chip */
  .kode-chip {
    width:36px;height:36px;border-radius:10px;background:#FFEBEE;color:#C62828;
    display:inline-flex;align-items:center;justify-content:center;
    font-weight:800;font-size:.78rem;flex-shrink:0;
  }

  /* Atribut badge */
  .badge-benefit { background:#E8F5E9;color:#2E7D32;font-size:.74rem;font-weight:600;padding:3px 10px;border-radius:12px; }
  .badge-cost    { background:#FFF3E0;color:#E65100;font-size:.74rem;font-weight:600;padding:3px 10px;border-radius:12px; }

  /* Bobot bar */
  .bobot-bar { height:6px;border-radius:3px;background:#FFEBEE;overflow:hidden;width:80px; }
  .bobot-fill { height:100%;border-radius:3px;background:linear-gradient(90deg,#ef5350,#C62828); }

  /* Action buttons */
  .btn-act {
    width:30px;height:30px;border-radius:7px;border:none;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:.82rem;transition:all .15s;
  }
  .btn-act-edit { background:#E3F2FD;color:#1565C0; }
  .btn-act-edit:hover { background:#BBDEFB; }
  .btn-act-del  { background:#FFEBEE;color:#C62828; }
  .btn-act-del:hover  { background:#FFCDD2; }

  /* Right panel */
  .panel-card {
    background:#fff;border-radius:12px;border:1px solid #F0F0F0;
    box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden;
  }
  .panel-header {
    background:linear-gradient(135deg,#C62828,#b71c1c);
    padding:14px 18px;color:#fff;
    display:flex;align-items:center;gap:8px;font-weight:600;font-size:.9rem;
  }
  .panel-body { padding:16px 18px; }

  .dist-item { margin-bottom:14px; }
  .dist-label { display:flex;justify-content:space-between;align-items:center;margin-bottom:4px; }
  .dist-name  { font-size:.82rem;font-weight:500;color:#333; }
  .dist-pct   { font-size:.82rem;font-weight:700;color:#C62828; }
  .dist-track { height:8px;border-radius:4px;background:#F5F5F5;overflow:hidden; }
  .dist-fill  { height:100%;border-radius:4px;background:linear-gradient(90deg,#ef5350,#C62828);transition:width .4s; }

  .total-row {
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 0;border-top:2px solid #F0F0F0;margin-top:4px;
    font-weight:700;font-size:.88rem;
  }
  .valid-chip   { background:#E8F5E9;color:#2E7D32;border-radius:20px;padding:2px 10px;font-size:.75rem; }
  .invalid-chip { background:#FFEBEE;color:#C62828;border-radius:20px;padding:2px 10px;font-size:.75rem; }

  .wj-pill {
    display:inline-block;background:#E3F2FD;color:#1565C0;
    font-size:.72rem;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:2px;
  }

  /* Modal */
  .modal-header-red { background:linear-gradient(135deg,#C62828,#b71c1c);padding:14px 20px; }
  .modal-header-red .modal-title { color:#fff;font-size:.92rem;font-weight:600; }
  .modal-header-red .btn-close   { filter:brightness(0) invert(1);opacity:.8; }

  /* Empty */
  .empty-state { text-align:center;padding:40px 20px;color:#bbb; }
  .empty-state i { font-size:2.2rem;display:block;margin-bottom:8px; }
</style>
</head>
<body>
<div id="sidebar"></div>
<div id="topbar"></div>
<div id="main">
  <div class="content-area">

    <!-- Summary cards -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="sum-card">
          <div class="sum-icon" style="background:#F3E5F5">
            <i class="bi bi-list-check" style="color:#7B1FA2"></i>
          </div>
          <div>
            <div class="sum-label">Total Kriteria</div>
            <div class="sum-value" id="sc-total">—</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="sum-card">
          <div class="sum-icon" style="background:#E8F5E9" id="sc-bobot-icon">
            <i class="bi bi-pie-chart-fill" style="color:#2E7D32"></i>
          </div>
          <div>
            <div class="sum-label">Total Bobot</div>
            <div class="sum-value" id="sc-bobot">—</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="sum-card">
          <div class="sum-icon" style="background:#E8F5E9">
            <i class="bi bi-arrow-up-circle-fill" style="color:#2E7D32"></i>
          </div>
          <div>
            <div class="sum-label">Benefit</div>
            <div class="sum-value" id="sc-benefit">—</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="sum-card">
          <div class="sum-icon" style="background:#FFF3E0">
            <i class="bi bi-arrow-down-circle-fill" style="color:#E65100"></i>
          </div>
          <div>
            <div class="sum-label">Cost</div>
            <div class="sum-value" id="sc-cost">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <!-- Table -->
      <div class="col-lg-8">
        <div class="sec-card" style="border-radius:12px;overflow:hidden">
          <div style="padding:14px 18px;border-bottom:1px solid #F0F0F0;display:flex;align-items:center;justify-content:space-between">
            <span style="font-weight:600;font-size:.95rem">
              <i class="bi bi-list-check me-2" style="color:var(--primary)"></i>Data Kriteria
            </span>
            <button class="btn btn-primary btn-sm px-3" onclick="openModal()">
              <i class="bi bi-plus-lg me-1"></i>Tambah Kriteria
            </button>
          </div>
          <div class="table-responsive">
            <table class="table tbl-kriteria mb-0">
              <thead>
                <tr>
                  <th style="width:54px">Kode</th>
                  <th>Nama Kriteria</th>
                  <th style="width:160px">Bobot</th>
                  <th style="width:90px">Atribut</th>
                  <th style="width:80px">Aksi</th>
                </tr>
              </thead>
              <tbody id="tb-kriteria">
                <tr><td colspan="5"><div class="empty-state"><i class="bi bi-hourglass-split"></i>Memuat data...</div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Bobot distribution panel -->
      <div class="col-lg-4">
        <div class="panel-card">
          <div class="panel-header">
            <i class="bi bi-pie-chart-fill"></i>Distribusi Bobot
          </div>
          <div class="panel-body" id="bobot-summary">
            <div class="empty-state" style="padding:30px 0">
              <i class="bi bi-bar-chart-line"></i>
              <div class="small">Belum ada data kriteria</div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Modal Form -->
<div class="modal fade" id="modal-form" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:12px;overflow:hidden;border:none">
      <div class="modal-header modal-header-red">
        <h6 class="modal-title" id="modal-title">
          <i class="bi bi-plus-circle-fill me-2"></i>Tambah Kriteria
        </h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <input type="hidden" id="fid">
        <div class="row g-3">
          <div class="col-4">
            <label class="form-label small fw-semibold mb-1">Kode <span class="text-danger">*</span></label>
            <input type="text" id="fkode" class="form-control form-control-sm" placeholder="C1" maxlength="10">
          </div>
          <div class="col-8">
            <label class="form-label small fw-semibold mb-1">Nama Kriteria <span class="text-danger">*</span></label>
            <input type="text" id="fnama" class="form-control form-control-sm" placeholder="Contoh: Pendidikan">
          </div>
          <div class="col-6">
            <label class="form-label small fw-semibold mb-1">Bobot (%) <span class="text-danger">*</span></label>
            <div class="input-group input-group-sm">
              <input type="number" id="fbobot" class="form-control" min="0" max="100" step="0.01" placeholder="25">
              <span class="input-group-text">%</span>
            </div>
          </div>
          <div class="col-6">
            <label class="form-label small fw-semibold mb-1">Atribut <span class="text-danger">*</span></label>
            <select id="fatribut" class="form-select form-select-sm">
              <option value="BENEFIT">BENEFIT</option>
              <option value="COST">COST</option>
            </select>
          </div>
          <div class="col-12">
            <div style="background:#F8F9FA;border-radius:8px;padding:10px 12px;font-size:.78rem;color:#666">
              <i class="bi bi-info-circle me-1 text-primary"></i>
              <strong>BENEFIT</strong>: nilai tinggi lebih baik &nbsp;·&nbsp;
              <strong>COST</strong>: nilai rendah lebih baik
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer" style="padding:12px 20px;border-top:1px solid #F0F0F0">
        <button class="btn btn-light btn-sm px-3" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary btn-sm px-4" id="btn-save" onclick="save()">
          <i class="bi bi-save me-1"></i>Simpan
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Confirm Delete -->
<div class="modal fade" id="modal-delete" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content" style="border-radius:12px;border:none">
      <div class="modal-body text-center py-4 px-4">
        <div style="width:52px;height:52px;background:#FFEBEE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
          <i class="bi bi-trash3-fill" style="font-size:1.3rem;color:#C62828"></i>
        </div>
        <div class="fw-semibold mb-1">Hapus Kriteria?</div>
        <div class="text-muted small mb-3" id="del-name">Sub kriteria terkait juga akan dihapus.</div>
        <div class="d-flex gap-2 justify-content-center">
          <button class="btn btn-light btn-sm px-3" data-bs-dismiss="modal">Batal</button>
          <button class="btn btn-danger btn-sm px-3" id="btn-confirm-del">Ya, Hapus</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
  renderLayout('Data Kriteria', 'kriteria');
  const modal       = new bootstrap.Modal(document.getElementById('modal-form'));
  const modalDelete = new bootstrap.Modal(document.getElementById('modal-delete'));
  let kriteriaList  = [];
  let pendingDelId  = null;

  /* ── Palette for distribution bars ───── */
  const palette = ['#C62828','#E53935','#EF5350','#E57373','#EF9A9A'];

  async function loadData() {
    try {
      const [kriRes, normRes] = await Promise.all([
        api.get('/api/kriteria'),
        api.get('/api/smart/normalisasi')
      ]);
      kriteriaList = kriRes.data;
      const norm   = normRes.data;

      /* Summary cards */
      const totalBobot  = kriteriaList.reduce((s, k) => s + k.bobot, 0);
      const benefitCnt  = kriteriaList.filter(k => k.atribut === 'BENEFIT').length;
      const costCnt     = kriteriaList.filter(k => k.atribut === 'COST').length;
      const isValid     = Math.abs(totalBobot - 100) < 0.01;

      document.getElementById('sc-total').textContent   = kriteriaList.length;
      document.getElementById('sc-bobot').textContent   = totalBobot.toFixed(2) + '%';
      document.getElementById('sc-benefit').textContent = benefitCnt;
      document.getElementById('sc-cost').textContent    = costCnt;

      const bobotIcon = document.getElementById('sc-bobot-icon');
      if (!isValid) {
        bobotIcon.style.background = '#FFEBEE';
        bobotIcon.innerHTML = '<i class="bi bi-exclamation-triangle-fill" style="color:#C62828"></i>';
      } else {
        bobotIcon.style.background = '#E8F5E9';
        bobotIcon.innerHTML = '<i class="bi bi-pie-chart-fill" style="color:#2E7D32"></i>';
      }

      /* Table */
      document.getElementById('tb-kriteria').innerHTML = kriteriaList.length === 0
        ? `<tr><td colspan="5"><div class="empty-state"><i class="bi bi-inbox"></i><div>Belum ada kriteria</div></div></td></tr>`
        : kriteriaList.map(k => `
          <tr>
            <td><div class="kode-chip">${k.kode}</div></td>
            <td>
              <div class="fw-semibold" style="font-size:.88rem">${k.namaKriteria}</div>
              <span class="wj-pill">W<sub>j</sub> = ${fmt4(norm[k.id])}</span>
            </td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <div class="bobot-bar flex-shrink-0">
                  <div class="bobot-fill" style="width:${k.bobot}%"></div>
                </div>
                <span class="fw-bold" style="font-size:.85rem">${k.bobot}%</span>
              </div>
            </td>
            <td>
              <span class="${k.atribut === 'BENEFIT' ? 'badge-benefit' : 'badge-cost'}">
                ${k.atribut}
              </span>
            </td>
            <td>
              <button class="btn-act btn-act-edit me-1" onclick="editItem(${k.id})" title="Edit">
                <i class="bi bi-pencil-fill"></i>
              </button>
              <button class="btn-act btn-act-del" onclick="confirmDelete(${k.id},'${k.namaKriteria.replace(/'/g, "\\'")}')">
                <i class="bi bi-trash3-fill"></i>
              </button>
            </td>
          </tr>`).join('');

      /* Distribution panel */
      if (kriteriaList.length === 0) {
        document.getElementById('bobot-summary').innerHTML =
          `<div class="empty-state" style="padding:30px 0"><i class="bi bi-bar-chart-line"></i><div class="small">Belum ada data</div></div>`;
        return;
      }
      document.getElementById('bobot-summary').innerHTML = `
        <div>
          ${kriteriaList.map((k, i) => `
            <div class="dist-item">
              <div class="dist-label">
                <span class="dist-name">
                  <span style="background:${palette[i % palette.length]};color:#fff;border-radius:5px;padding:0 6px;font-size:.72rem;font-weight:700;margin-right:5px">${k.kode}</span>
                  ${k.namaKriteria}
                </span>
                <span class="dist-pct">${k.bobot}%</span>
              </div>
              <div class="dist-track">
                <div class="dist-fill" style="width:${k.bobot}%;background:${palette[i % palette.length]}"></div>
              </div>
            </div>`).join('')}
        </div>
        <div class="total-row">
          <span>Total Bobot</span>
          <div class="d-flex align-items-center gap-2">
            <span class="fw-bold">${totalBobot.toFixed(2)}%</span>
            <span class="${isValid ? 'valid-chip' : 'invalid-chip'}">${isValid ? '✓ Valid' : '⚠ Invalid'}</span>
          </div>
        </div>`;
    } catch(e) { showToast(e.message, 'error'); }
  }

  function openModal(data = null) {
    document.getElementById('fid').value      = data?.id      || '';
    document.getElementById('fkode').value    = data?.kode    || '';
    document.getElementById('fnama').value    = data?.namaKriteria || '';
    document.getElementById('fbobot').value   = data?.bobot   || '';
    document.getElementById('fatribut').value = data?.atribut || 'BENEFIT';
    document.getElementById('modal-title').innerHTML = data
      ? '<i class="bi bi-pencil-fill me-2"></i>Edit Kriteria'
      : '<i class="bi bi-plus-circle-fill me-2"></i>Tambah Kriteria';
    modal.show();
  }

  function editItem(id) {
    const k = kriteriaList.find(x => x.id === id);
    if (k) openModal(k);
  }

  async function save() {
    const id = document.getElementById('fid').value;
    const payload = {
      kode:        document.getElementById('fkode').value.trim(),
      namaKriteria:document.getElementById('fnama').value.trim(),
      bobot:       parseFloat(document.getElementById('fbobot').value),
      atribut:     document.getElementById('fatribut').value
    };
    if (!payload.kode || !payload.namaKriteria || isNaN(payload.bobot)) {
      showToast('Lengkapi semua field', 'error'); return;
    }
    const btn = document.getElementById('btn-save');
    setLoading(btn, true);
    try {
      if (id) { await api.put('/api/kriteria/' + id, payload); showToast('Kriteria diupdate'); }
      else     { await api.post('/api/kriteria', payload);      showToast('Kriteria ditambahkan'); }
      modal.hide();
      loadData();
    } catch(e) { showToast(e.message, 'error'); }
    finally { setLoading(btn, false, '<i class="bi bi-save me-1"></i>Simpan'); }
  }

  /* Delete with modal */
  function confirmDelete(id, nama) {
    pendingDelId = id;
    document.getElementById('del-name').textContent =
      `"${nama}" beserta sub kriteria terkait akan dihapus permanen.`;
    modalDelete.show();
  }

  document.getElementById('btn-confirm-del').addEventListener('click', async () => {
    if (!pendingDelId) return;
    const btn = document.getElementById('btn-confirm-del');
    setLoading(btn, true);
    try {
      await api.delete('/api/kriteria/' + pendingDelId);
      showToast('Kriteria dihapus');
      modalDelete.hide();
      loadData();
    } catch(e) { showToast(e.message, 'error'); }
    finally { setLoading(btn, false, 'Ya, Hapus'); pendingDelId = null; }
  });

  loadData();
</script>
</body>
</html>
