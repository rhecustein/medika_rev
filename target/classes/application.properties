spring.application.name=spk-medika

# ─── Database ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/spk_medika?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ─── SQL Init (seed data) ───────────────────────────────────────────────────
spring.sql.init.mode=never

# ─── JWT ────────────────────────────────────────────────────────────────────
app.jwt.secret=5a4b3c2d1e0f9g8h7i6j5k4l3m2n1o0p5a4b3c2d1e0f9g8h7i6j5k4l3m2n1o0p
app.jwt.expiration=86400000

# ─── Server ─────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/

# ─── Static Resources ───────────────────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.com.medika=INFO
logging.level.org.springframework.security=WARN
