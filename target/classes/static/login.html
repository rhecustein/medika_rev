<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — SPK Medika Akses Investama</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-circle"><i class="bi bi-heart-pulse-fill"></i></div>
      <h4>SPK Medika Akses Investama</h4>
      <p>Sistem Pendukung Keputusan Rekrutmen</p>
    </div>

    <div id="alert-box" class="alert alert-danger d-none py-2 px-3 mb-3" style="font-size:.85rem"></div>

    <form id="login-form">
      <div class="mb-3">
        <label class="form-label fw-semibold small">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-person text-muted"></i>
          </span>
          <input type="text" id="username" class="form-control border-start-0"
                 placeholder="Masukkan username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input type="password" id="password" class="form-control border-start-0"
                 placeholder="Masukkan password" required>
          <button type="button" class="input-group-text bg-light" id="toggle-pw">
            <i class="bi bi-eye text-muted" id="eye-icon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="login-btn">
        <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
      </button>
    </form>

    <hr class="my-3">
    <div class="text-center text-muted" style="font-size:.75rem">
      <strong>Demo Akun:</strong><br>
      admin / admin123 &nbsp;|&nbsp; hrd / hrd123 &nbsp;|&nbsp; penilai / penilai123
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script>
  // Redirect if already logged in
  if (localStorage.getItem('token')) window.location.href = '/dashboard.html';

  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const ic = document.getElementById('eye-icon');
    if (pw.type === 'password') { pw.type = 'text'; ic.className = 'bi bi-eye-slash text-muted'; }
    else { pw.type = 'password'; ic.className = 'bi bi-eye text-muted'; }
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const alert = document.getElementById('alert-box');
    alert.classList.add('d-none');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Memproses...';

    try {
      const res = await api.post('/api/auth/login', {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      });
      const d = res.data;
      localStorage.setItem('token', d.token);
      localStorage.setItem('user', JSON.stringify({ id: d.id, username: d.username, nama: d.nama, role: d.role }));
      window.location.href = '/dashboard.html';
    } catch (err) {
      alert.classList.remove('d-none');
      alert.textContent = err.message || 'Login gagal';
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Masuk';
    }
  });
</script>
</body>
</html>
