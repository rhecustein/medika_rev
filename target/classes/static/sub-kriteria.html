<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sub Kriteria — SPK Medika</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/assets/css/style.css">
<style>
  :root { --primary:#C62828; }

  /* Left panel — kriteria selector */
  .left-panel {
    background:#fff;border-radius:12px;border:1px solid #F0F0F0;
    box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden;
  }
  .left-panel-header {
    background:linear-gradient(135deg,#C62828,#b71c1c);
    padding:14px 18px;color:#fff;font-weight:600;font-size:.9rem;
    display:flex;align-items:center;gap:8px;
  }
  .kriteria-card {
    padding:12px 16px;border-bottom:1px solid #F5F5F5;cursor:pointer;
    transition:background .15s;display:flex;align-items:center;gap:10px;
  }
  .kriteria-card:last-child { border-bottom:none; }
  .kriteria-card:hover { background:#FFF5F5; }
  .kriteria-card.active { background:#FFEBEE;border-left:3px solid #C62828; }
  .kri-kode {
    width:36px;height:36px;border-radius:9px;background:#FFEBEE;color:#C62828;
    display:flex;align-items:center;justify-content:center;font-weight:800;
    font-size:.75rem;flex-shrink:0;
  }
  .kriteria-card.active .kri-kode { background:#C62828;color:#fff; }
  .kri-name  { font-size:.85rem;font-weight:600;color:#1a1a1a;line-height:1.2; }
  .kri-bobot { font-size:.73rem;color:#888;margin-top:1px; }

  /* Atribut badge */
  .badge-benefit { background:#E8F5E9;color:#2E7D32;font-size:.7rem;font-weight:600;padding:1px 7px;border-radius:8px; }
  .badge-cost    { background:#FFF3E0;color:#E65100;font-size:.7rem;font-weight:600;padding:1px 7px;border-radius:8px; }

  /* Right panel */
  .right-panel {
    background:#fff;border-radius:12px;border:1px solid #F0F0F0;
    box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden;
  }
  .right-header {
    padding:14px 18px;border-bottom:1px solid #F0F0F0;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  }
  .right-title { font-weight:600;font-size:.92rem;color:#1a1a1a;display:flex;align-items:center;gap:8px; }

  /* Table */
  .tbl-sub thead th {
    background:#FAFAFA;font-size:.75rem;font-weight:700;color:#666;
    text-transform:uppercase;letter-spacing:.4px;padding:10px 14px;
    border-bottom:2px solid #F0F0F0;white-space:nowrap;
  }
  .tbl-sub tbody td { padding:11px 14px;vertical-align:middle; }
  .tbl-sub tbody tr { border-bottom:1px solid #F8F8F8;transition:background .12s; }
  .tbl-sub tbody tr:hover { background:#FAFAFA; }

  /* Value display */
  .val-track { height:7px;border-radius:4px;background:#F5F5F5;overflow:hidden;width:90px; }
  .val-fill  { height:100%;border-radius:4px;background:linear-gradient(90deg,#ef5350,#C62828); }
  .val-num   { font-size:.88rem;font-weight:700;color:#1a1a1a;min-width:28px; }

  /* Rank badge */
  .rank-circle {
    width:28px;height:28px;border-radius:50%;background:#F5F5F5;color:#666;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:.75rem;font-weight:700;flex-shrink:0;
  }

  /* Action buttons */
  .btn-act {
    width:30px;height:30px;border-radius:7px;border:none;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;font-size:.82rem;transition:all .15s;
  }
  .btn-act-edit { background:#E3F2FD;color:#1565C0; }
  .btn-act-edit:hover { background:#BBDEFB; }
  .btn-act-del  { background:#FFEBEE;color:#C62828; }
  .btn-act-del:hover  { background:#FFCDD2; }

  /* Empty / instruction state */
  .state-box { text-align:center;padding:48px 20px;color:#bbb; }
  .state-box i { font-size:2.4rem;display:block;margin-bottom:10px; }
  .state-box .title { font-size:.9rem;font-weight:600;color:#aaa; }
  .state-box .sub   { font-size:.8rem;margin-top:4px; }

  /* Modal */
  .modal-header-red { background:linear-gradient(135deg,#C62828,#b71c1c);padding:14px 20px; }
  .modal-header-red .modal-title { color:#fff;font-size:.92rem;font-weight:600; }
  .modal-header-red .btn-close   { filter:brightness(0) invert(1);opacity:.8; }

  /* Left panel scroll */
  .kri-list { max-height:calc(100vh - 280px);overflow-y:auto; }

  /* No kriteria placeholder */
  .no-kri { padding:28px 16px;text-align:center;color:#ccc;font-size:.82rem; }
</style>
</head>
<body>
<div id="sidebar"></div>
<div id="topbar"></div>
<div id="main">
  <div class="content-area">
    <div class="row g-3">

      <!-- Left: Kriteria selector -->
      <div class="col-lg-4 col-md-5">
        <div class="left-panel">
          <div class="left-panel-header">
            <i class="bi bi-list-check"></i>Pilih Kriteria
          </div>
          <div class="kri-list" id="kri-list">
            <div class="no-kri"><i class="bi bi-hourglass-split d-block mb-2" style="font-size:1.5rem"></i>Memuat kriteria...</div>
          </div>
        </div>
      </div>

      <!-- Right: Sub kriteria table -->
      <div class="col-lg-8 col-md-7">
        <div class="right-panel">
          <div class="right-header">
            <div class="right-title" id="right-title">
              <i class="bi bi-diagram-3" style="color:var(--primary)"></i>
              <span id="right-title-text">Sub Kriteria</span>
            </div>
            <button class="btn btn-primary btn-sm px-3" id="btn-add" onclick="openModal()" disabled>
              <i class="bi bi-plus-lg me-1"></i>Tambah
            </button>
          </div>

          <div class="table-responsive" id="sub-table-wrap">
            <table class="table tbl-sub mb-0">
              <thead>
                <tr>
                  <th style="width:44px">#</th>
                  <th>Nama Sub Kriteria</th>
                  <th style="width:160px">Nilai</th>
                  <th style="width:80px">Aksi</th>
                </tr>
              </thead>
              <tbody id="tb-sub">
                <tr><td colspan="4">
                  <div class="state-box">
                    <i class="bi bi-arrow-left-circle"></i>
                    <div class="title">Pilih kriteria terlebih dahulu</div>
                    <div class="sub">Klik salah satu kriteria di panel kiri</div>
                  </div>
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal Form -->
<div class="modal fade" id="modal-form" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content" style="border-radius:12px;overflow:hidden;border:none">
      <div class="modal-header modal-header-red">
        <h6 class="modal-title" id="modal-title">
          <i class="bi bi-plus-circle-fill me-2"></i>Tambah Sub Kriteria
        </h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <input type="hidden" id="fid">

        <!-- Context info -->
        <div style="background:#FFEBEE;border-radius:8px;padding:9px 12px;margin-bottom:16px;display:flex;align-items:center;gap:8px">
          <div id="modal-kri-chip" style="background:#C62828;color:#fff;border-radius:6px;padding:1px 8px;font-size:.75rem;font-weight:700"></div>
          <span class="small fw-semibold" id="modal-kri-name" style="color:#C62828"></span>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold mb-1">Nama Sub Kriteria <span class="text-danger">*</span></label>
          <input type="text" id="fnama" class="form-control form-control-sm" placeholder="Contoh: S1, D3, > 5 Tahun">
        </div>
        <div>
          <label class="form-label small fw-semibold mb-1">Nilai (0–100) <span class="text-danger">*</span></label>
          <input type="number" id="fnilai" class="form-control form-control-sm" min="0" max="100" step="1" placeholder="0–100">
          <div class="form-text mt-1">Nilai numerik yang mewakili bobot sub kriteria ini</div>
        </div>
      </div>
      <div class="modal-footer" style="padding:12px 16px;border-top:1px solid #F0F0F0">
        <button class="btn btn-light btn-sm px-3" data-bs-dismiss="modal">Batal</button>
        <button class="btn btn-primary btn-sm px-4" id="btn-save" onclick="save()">
          <i class="bi bi-save me-1"></i>Simpan
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Confirm Delete -->
<div class="modal fade" id="modal-delete" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content" style="border-radius:12px;border:none">
      <div class="modal-body text-center py-4 px-4">
        <div style="width:52px;height:52px;background:#FFEBEE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
          <i class="bi bi-trash3-fill" style="font-size:1.3rem;color:#C62828"></i>
        </div>
        <div class="fw-semibold mb-1">Hapus Sub Kriteria?</div>
        <div class="text-muted small mb-3" id="del-name"></div>
        <div class="d-flex gap-2 justify-content-center">
          <button class="btn btn-light btn-sm px-3" data-bs-dismiss="modal">Batal</button>
          <button class="btn btn-danger btn-sm px-3" id="btn-confirm-del">Ya, Hapus</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
  renderLayout('Sub Kriteria', 'sub-kriteria');
  const modal       = new bootstrap.Modal(document.getElementById('modal-form'));
  const modalDelete = new bootstrap.Modal(document.getElementById('modal-delete'));

  let kriteriaList    = [];
  let selectedKriteria = null;
  let pendingDelId    = null;

  /* ── Load left panel ───────────────────────────────────────── */
  async function loadKriteria() {
    try {
      const res = await api.get('/api/kriteria');
      kriteriaList = res.data;
      const list = document.getElementById('kri-list');

      if (kriteriaList.length === 0) {
        list.innerHTML = `<div class="no-kri"><i class="bi bi-inbox d-block mb-2" style="font-size:1.5rem"></i>Belum ada kriteria</div>`;
        return;
      }

      list.innerHTML = kriteriaList.map(k => `
        <div class="kriteria-card" id="kc-${k.id}" onclick="selectKriteria(${k.id})">
          <div class="kri-kode">${k.kode}</div>
          <div class="flex-grow-1">
            <div class="kri-name">${k.namaKriteria}</div>
            <div class="kri-bobot">
              <span class="${k.atribut === 'BENEFIT' ? 'badge-benefit' : 'badge-cost'}">${k.atribut}</span>
              <span class="ms-1">· ${k.bobot}%</span>
            </div>
          </div>
          <i class="bi bi-chevron-right text-muted" style="font-size:.75rem"></i>
        </div>`).join('');
    } catch(e) { showToast(e.message, 'error'); }
  }

  /* ── Select kriteria ───────────────────────────────────────── */
  function selectKriteria(id) {
    selectedKriteria = id;
    document.querySelectorAll('.kriteria-card').forEach(c => c.classList.remove('active'));
    const card = document.getElementById('kc-' + id);
    if (card) card.classList.add('active');

    const k = kriteriaList.find(x => x.id === id);
    document.getElementById('right-title-text').textContent =
      k ? `Sub Kriteria — ${k.kode} ${k.namaKriteria}` : 'Sub Kriteria';
    document.getElementById('btn-add').disabled = false;
    loadSub(id);
  }

  /* ── Load sub kriteria table ───────────────────────────────── */
  async function loadSub(kriteriaId) {
    const tb = document.getElementById('tb-sub');
    tb.innerHTML = `<tr><td colspan="4" class="text-center py-3 text-muted small">Memuat...</td></tr>`;
    try {
      const res = await api.get('/api/sub-kriteria?kriteriaId=' + kriteriaId);
      const data = res.data;

      if (data.length === 0) {
        tb.innerHTML = `<tr><td colspan="4">
          <div class="state-box">
            <i class="bi bi-inbox"></i>
            <div class="title">Belum ada sub kriteria</div>
            <div class="sub">Klik "Tambah" untuk menambahkan sub kriteria baru</div>
          </div>
        </td></tr>`;
        return;
      }

      /* Sort by nilai descending for ranking display */
      const sorted = [...data].sort((a, b) => b.nilai - a.nilai);
      const maxVal = sorted[0]?.nilai || 100;

      tb.innerHTML = data.map((s, i) => {
        const rank = sorted.findIndex(x => x.id === s.id) + 1;
        return `
          <tr>
            <td><div class="rank-circle">${i + 1}</div></td>
            <td>
              <div class="fw-semibold" style="font-size:.88rem">${s.namaSub}</div>
            </td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <div class="val-track">
                  <div class="val-fill" style="width:${(s.nilai / 100) * 100}%"></div>
                </div>
                <span class="val-num">${s.nilai}</span>
              </div>
            </td>
            <td>
              <button class="btn-act btn-act-edit me-1" onclick="editItem(${s.id},'${s.namaSub.replace(/'/g,"\\'")}',${s.nilai})" title="Edit">
                <i class="bi bi-pencil-fill"></i>
              </button>
              <button class="btn-act btn-act-del" onclick="confirmDelete(${s.id},'${s.namaSub.replace(/'/g,"\\'")}')">
                <i class="bi bi-trash3-fill"></i>
              </button>
            </td>
          </tr>`;
      }).join('');
    } catch(e) { showToast(e.message, 'error'); }
  }

  /* ── Modal form ─────────────────────────────────────────────── */
  function openModal(data = null) {
    document.getElementById('fid').value    = data?.id    || '';
    document.getElementById('fnama').value  = data?.namaSub || '';
    document.getElementById('fnilai').value = data?.nilai  || '';

    const k = kriteriaList.find(x => x.id === selectedKriteria);
    document.getElementById('modal-kri-chip').textContent = k?.kode || '';
    document.getElementById('modal-kri-name').textContent = k?.namaKriteria || '';

    document.getElementById('modal-title').innerHTML = data
      ? '<i class="bi bi-pencil-fill me-2"></i>Edit Sub Kriteria'
      : '<i class="bi bi-plus-circle-fill me-2"></i>Tambah Sub Kriteria';
    modal.show();
  }

  function editItem(id, namaSub, nilai) { openModal({ id, namaSub, nilai }); }

  async function save() {
    const id    = document.getElementById('fid').value;
    const nama  = document.getElementById('fnama').value.trim();
    const nilai = parseFloat(document.getElementById('fnilai').value);
    if (!nama || isNaN(nilai)) { showToast('Lengkapi semua field', 'error'); return; }

    const payload = { kriteriaId: parseInt(selectedKriteria), namaSub: nama, nilai };
    const btn = document.getElementById('btn-save');
    setLoading(btn, true);
    try {
      if (id) { await api.put('/api/sub-kriteria/' + id, payload); showToast('Sub kriteria diupdate'); }
      else     { await api.post('/api/sub-kriteria', payload);      showToast('Sub kriteria ditambahkan'); }
      modal.hide();
      loadSub(selectedKriteria);
    } catch(e) { showToast(e.message, 'error'); }
    finally { setLoading(btn, false, '<i class="bi bi-save me-1"></i>Simpan'); }
  }

  /* ── Delete ─────────────────────────────────────────────────── */
  function confirmDelete(id, nama) {
    pendingDelId = id;
    document.getElementById('del-name').textContent = `"${nama}" akan dihapus permanen.`;
    modalDelete.show();
  }

  document.getElementById('btn-confirm-del').addEventListener('click', async () => {
    if (!pendingDelId) return;
    const btn = document.getElementById('btn-confirm-del');
    setLoading(btn, true);
    try {
      await api.delete('/api/sub-kriteria/' + pendingDelId);
      showToast('Sub kriteria dihapus');
      modalDelete.hide();
      loadSub(selectedKriteria);
    } catch(e) { showToast(e.message, 'error'); }
    finally { setLoading(btn, false, 'Ya, Hapus'); pendingDelId = null; }
  });

  /* ── Init ───────────────────────────────────────────────────── */
  loadKriteria();
</script>
</body>
</html>
